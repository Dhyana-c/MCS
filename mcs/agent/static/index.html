<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCS 记忆助手</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    margin: 0; background: #f0f2f5; color: #1a1a1a;
  }
  #app {
    max-width: 760px; margin: 0 auto;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 14px 18px; background: #fff;
    border-bottom: 1px solid #e4e6eb;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header span { font-size: 12px; color: #888; }
  #messages { flex: 1; overflow-y: auto; padding: 18px; }
  .msg {
    margin-bottom: 12px; max-width: 78%; padding: 10px 14px;
    border-radius: 14px; line-height: 1.55; white-space: pre-wrap;
    word-break: break-word;
  }
  .user { background: #2563eb; color: #fff; margin-left: auto; }
  .agent { background: #fff; border: 1px solid #e4e6eb; }
  .sys { color: #999; font-size: 12px; text-align: center; max-width: 100%; }
  #input-bar {
    display: flex; gap: 8px; padding: 12px;
    background: #fff; border-top: 1px solid #e4e6eb;
  }
  #input {
    flex: 1; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
  }
  #input:focus { border-color: #2563eb; }
  #send {
    padding: 10px 22px; background: #2563eb; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  #send:disabled { background: #9ca3af; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🧠 MCS 记忆助手</h1>
    <span>基于记忆图谱的对话 agent</span>
  </header>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="input" placeholder="输入消息，回车发送……" autocomplete="off">
    <button id="send">发送</button>
  </div>
</div>
<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  inputEl.value = "";
  sendBtn.disabled = true;
  addMsg(text, "user");
  const thinking = addMsg("思考中……", "sys");
  try {
    const r = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text}),
    });
    thinking.remove();
    if (!r.ok) {
      addMsg("（出错：" + r.status + "）", "sys");
    } else {
      const data = await r.json();
      addMsg(data.reply || "（空回复）", "agent");
    }
  } catch (e) {
    thinking.remove();
    addMsg("（请求失败：" + e + "）", "sys");
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener("click", sendMsg);
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMsg(); });
inputEl.focus();
</script>
</body>
</html>
